image: docker:20.10.16

services:
  - docker:20.10.16-dind

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - test
  - deploy

before_script:
  - docker info
  - apk add --no-cache curl

build-backend:
  stage: build
  script:
    - cd src/backend
    - docker build -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA .
    - docker tag $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE/backend:latest
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  only:
    - main
    - develop

build-frontend:
  stage: build
  script:
    - cd src/frontend
    - docker build -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA .
    - docker tag $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE/frontend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  only:
    - main
    - develop

test-backend:
  stage: test
  script:
    - docker run --rm $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA python -c "import fastapi; print('FastAPI version:', fastapi.__version__)"
    - docker run --rm $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA python -c "import sqlalchemy; print('SQLAlchemy version:', sqlalchemy.__version__)"
  only:
    - main
    - develop

deploy-k8s:
  stage: deploy
  script:
    - apk add --no-cache kubectl
    - kubectl config set-cluster k8s --server="$K8S_SERVER" --insecure-skip-tls-verify=true
    - kubectl config set-credentials gitlab --token="$K8S_TOKEN"
    - kubectl config set-context default --cluster=k8s --user=gitlab
    - kubectl config use-context default
    - kubectl set image deployment/backend backend=$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA -n recipe-base
    - kubectl set image deployment/frontend frontend=$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA -n recipe-base
    - kubectl rollout status deployment/backend -n recipe-base
    - kubectl rollout status deployment/frontend -n recipe-base
  only:
    - main
  when: manual