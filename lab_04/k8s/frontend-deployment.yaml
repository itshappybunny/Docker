apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: recipe-base
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: recipe-frontend:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: BACKEND_URL
          value: "http://backend-service:8000"  # Для внутренней коммуникации
        - name: PUBLIC_BACKEND_URL
          value: "http://recipe-base.local/api"  # Для внешнего доступа через Ingress
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: recipe-base
spec:
  selector:
    app: frontend
  ports:
  - port: 8501
    targetPort: 8501
    name: http
  # Service type можно оставить ClusterIP, т.к. Ingress будет направлять трафик
  type: ClusterIP